<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Bienvenida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0A0A0A;
            color: #F5F0E8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #1A1A1A;
            border-radius: 32px;
            padding: 50px 40px 35px;
            border: 1px solid rgba(201, 168, 76, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background: radial-gradient(ellipse at 20% 20%, rgba(201, 168, 76, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== IDIOMA ===== */
        .idioma-selector {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 2;
        }
        .idioma-selector select {
            background: #0A0A0A;
            border: 1px solid #333;
            border-radius: 8px;
            color: #F5F0E8;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .idioma-selector select:focus {
            border-color: #C9A84C;
        }

        /* ===== LOGO ===== */
        .logo {
            position: relative;
            z-index: 1;
            margin-bottom: 10px;
        }
        .logo h1 {
            font-family: 'Georgia', serif;
            font-size: 38px;
            color: #C9A84C;
            letter-spacing: 6px;
        }
        .logo .slogan {
            font-size: 13px;
            color: #BA7E68;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ===== CITA ===== */
        .cita {
            position: relative;
            z-index: 1;
            margin: 24px 0 32px;
            padding: 20px;
            border-left: 3px solid rgba(201, 168, 76, 0.3);
            background: rgba(201, 168, 76, 0.03);
            border-radius: 8px;
        }
        .cita .texto {
            font-size: 18px;
            font-weight: 300;
            color: #E0D5A3;
            line-height: 1.6;
        }
        .cita .autor {
            font-size: 13px;
            color: #BA7E68;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== BOTONES ===== */
        .botones {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 30px 0 20px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .btn-ingresar {
            background: #C9A84C;
            color: #0A0A0A;
        }
        .btn-ingresar:hover {
            background: #E0D5A3;
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.3);
        }
        .btn-registrar {
            background: transparent;
            color: #C9A84C;
            border: 2px solid #C9A84C;
        }
        .btn-registrar:hover {
            background: #C9A84C;
            color: #0A0A0A;
            transform: scale(1.02);
        }

        /* ===== TÉRMINOS ===== */
        .terminos {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #BA7E68;
            margin: 16px 0 14px;
            justify-content: center;
        }
        .terminos input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #C9A84C;
            cursor: pointer;
        }
        .terminos a {
            color: #C9A84C;
            text-decoration: none;
        }
        .terminos a:hover {
            text-decoration: underline;
        }

        /* ===== MANUAL ===== */
        .manual {
            position: relative;
            z-index: 1;
            display: block;
            font-size: 13px;
            color: #BA7E68;
            text-decoration: none;
            margin: 6px 0 20px;
            cursor: pointer;
        }
        .manual:hover {
            color: #C9A84C;
        }

        /* ===== FOOTER ===== */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(201, 168, 76, 0.05);
            font-size: 12px;
            color: #444;
        }
        .footer strong {
            color: #C9A84C;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container {
                padding: 40px 20px 28px;
            }
            .logo h1 {
                font-size: 28px;
            }
            .cita .texto {
                font-size: 15px;
            }
            .idioma-selector {
                top: 14px;
                right: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- SELECTOR DE IDIOMA -->
        <div class="idioma-selector">
            <select id="idiomaSelect">
                <option value="es">🇪🇸 Español</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>

        <!-- LOGO -->
        <div class="logo">
            <h1>LEGADO</h1>
            <div class="slogan">+ CONCIENCIA Y FUTURO PARA LA HUMANIDAD +</div>
        </div>

        <!-- CITA -->
        <div class="cita">
            <div class="texto">"La seguridad laboral no debería ser un lujo. Es un derecho. Hazla automática."</div>
            <div class="autor">— LEGADO</div>
        </div>

        <!-- BOTONES -->
        <div class="botones">
            <button class="btn btn-ingresar" id="btnIngresar">Ingresar</button>
            <button class="btn btn-registrar" id="btnRegistrar">Registrarse</button>
        </div>

        <!-- TÉRMINOS -->
        <div class="terminos">
            <input type="checkbox" id="checkTerminos" />
            <label for="checkTerminos">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
            </label>
        </div>

        <!-- MANUAL -->
        <a href="#" class="manual" id="btnManual">📖 Manual de uso y atajos</a>

        <!-- FOOTER -->
        <div class="footer">
            <strong>LEGADO</strong> · Seguridad Laboral Automática · v1.0
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const btnIngresar = document.getElementById('btnIngresar');
            const btnRegistrar = document.getElementById('btnRegistrar');
            const btnManual = document.getElementById('btnManual');
            const idiomaSelect = document.getElementById('idiomaSelect');
            const checkTerminos = document.getElementById('checkTerminos');

            // ===== INGRESAR =====
            btnIngresar.addEventListener('click', function() {
                if (!checkTerminos.checked) {
                    alert('📋 Debes aceptar los Términos y Condiciones.');
                    return;
                }
                console.log('🔐 Ingresar');
                alert('🔐 Redirigiendo a inicio de sesión...');
                // window.location.href = 'login.html';
            });

            // ===== REGISTRARSE =====
            btnRegistrar.addEventListener('click', function() {
                if (!checkTerminos.checked) {
                    alert('📋 Debes aceptar los Términos y Condiciones.');
                    return;
                }
                console.log('📝 Registrarse');
                alert('📝 Redirigiendo a registro...');
                // window.location.href = 'registro.html';
            });

            // ===== MANUAL =====
            btnManual.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('📖 Manual de uso');
                alert('📖 Abriendo manual de uso y atajos...');
            });

            // ===== IDIOMA =====
            idiomaSelect.addEventListener('change', function() {
                console.log('🌐 Cambiando idioma a:', this.value);
                alert('🌐 Cambiando idioma a: ' + (this.value === 'es' ? 'Español' : 'English'));
            });

            console.log('✅ Ventana de bienvenida cargada correctamente.');
            console.log('🔘 Botones: Ingresar, Registrarse, Manual de uso, Selector de idioma.');
            console.log('📋 Términos y condiciones con validación.');

        })();
    </script>

</body>
</html>
