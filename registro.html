<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Registro</title>
    <style>
        :root {
            --negro-profundo: #0A0A0A;
            --negro-carbon: #1A1A1A;
            --dorado-epico: #C9A84C;
            --dorado-claro: #E8D5A3;
            --blanco-roto: #F5F0E8;
            --gris-calido: #8A7E6B;
            --rojo-alerta: #E74C3C;
            --verde-exito: #2ECC71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--negro-profundo);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--blanco-roto);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: var(--negro-carbon);
            border-radius: 32px;
            padding: 40px 28px 35px;
            border: 1px solid rgba(201, 168, 76, 0.12);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background: radial-gradient(ellipse at 20% 20%, rgba(201, 168, 76, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .logo {
            position: relative;
            z-index: 1;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            color: var(--dorado-epico);
            letter-spacing: 6px;
        }

        .logo .sub {
            font-size: 11px;
            color: var(--gris-calido);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .form-title {
            position: relative;
            z-index: 1;
            font-size: 22px;
            font-weight: 300;
            margin-bottom: 4px;
        }

        .form-subtitle {
            position: relative;
            z-index: 1;
            font-size: 14px;
            color: var(--gris-calido);
            margin-bottom: 24px;
        }

        .form-subtitle span {
            color: var(--dorado-epico);
        }

        .input-group {
            position: relative;
            z-index: 1;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--gris-calido);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .input-group label .requerido {
            color: var(--rojo-alerta);
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--negro-profundo);
            border: 1px solid rgba(201, 168, 76, 0.08);
            border-radius: 12px;
            color: var(--blanco-roto);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--dorado-epico);
        }

        .input-group select option {
            background: var(--negro-carbon);
            color: var(--blanco-roto);
        }

        .input-group .input-con-verificacion {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group .input-con-verificacion input {
            flex: 1;
        }

        .btn-verificar {
            padding: 14px 16px;
            background: var(--negro-profundo);
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 12px;
            color: var(--dorado-claro);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .btn-verificar:hover:not(:disabled) {
            border-color: var(--dorado-epico);
            background: rgba(201, 168, 76, 0.05);
        }

        .btn-verificar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-verificar.valido {
            border-color: var(--verde-exito);
            color: var(--verde-exito);
        }

        .btn-verificar.invalido {
            border-color: var(--rojo-alerta);
            color: var(--rojo-alerta);
        }

        .btn-verificar.verificando {
            color: var(--gris-calido);
            border-color: var(--gris-calido);
        }

        .datos-dni {
            background: var(--negro-profundo);
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: -8px;
            margin-bottom: 16px;
            border: 1px solid rgba(46, 204, 113, 0.1);
            display: none;
        }

        .datos-dni.visible {
            display: block;
            animation: fadeUp 0.3s ease;
        }

        .datos-dni .dni-nombre {
            color: var(--verde-exito);
            font-weight: 600;
            font-size: 15px;
        }

        .datos-dni .dni-label {
            font-size: 11px;
            color: var(--gris-calido);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-dorado {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--dorado-epico), #B8942E);
            color: var(--negro-profundo);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 25px rgba(201, 168, 76, 0.15);
        }

        .btn-dorado:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(201, 168, 76, 0.3);
        }

        .btn-dorado:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 40px;
            cursor: pointer;
            color: var(--gris-calido);
            font-size: 18px;
            background: transparent;
            border: none;
        }

        .link {
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: var(--gris-calido);
            text-decoration: none;
        }

        .link:hover {
            color: var(--dorado-claro);
        }

        .mensaje {
            position: relative;
            z-index: 1;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }

        .mensaje.error { color: var(--rojo-alerta); }
        .mensaje.exito { color: var(--verde-exito); }

        .footer {
            position: relative;
            z-index: 1;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(201, 168, 76, 0.05);
            font-size: 11px;
            color: var(--gris-calido);
        }

        .footer strong { color: var(--dorado-epico); }

        .terminos {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--gris-calido);
            margin: 12px 0 16px;
            text-align: left;
        }

        .terminos input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--dorado-epico);
            cursor: pointer;
        }

        .terminos a {
            color: var(--dorado-epico);
            text-decoration: none;
        }

        .terminos a:hover {
            text-decoration: underline;
        }

        @media (max-width: 420px) {
            .container { padding: 28px 16px 24px; }
            .logo h1 { font-size: 24px; }
            .input-group .input-con-verificacion {
                flex-direction: column;
            }
            .btn-verificar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">
            <h1>LEGADO</h1>
            <div class="sub">✦ Seguridad Laboral Automática ✦</div>
        </div>

        <div class="form-title">📝 Crear cuenta</div>
        <div class="form-subtitle">Comienza tu viaje con <span>LEGADO</span></div>

        <!-- DNI -->
        <div class="input-group">
            <label for="regDNI">Documento de Identidad (DNI) <span class="requerido">*</span></label>
            <div class="input-con-verificacion">
                <input type="text" id="regDNI" placeholder="Ej: 12345678" maxlength="8" />
                <button class="btn-verificar" id="btnVerificarDNI">🔍 Verificar</button>
            </div>
            <div style="font-size:11px;color:var(--gris-calido);margin-top:4px;">
                Verificamos tu identidad con fuentes públicas oficiales (RENIEC/SUNAT)
            </div>
        </div>

        <!-- Datos del DNI -->
        <div class="datos-dni" id="datosDNI">
            <div class="dni-label">✅ Identidad verificada</div>
            <div class="dni-nombre" id="dniNombreCompleto">—</div>
            <div style="font-size:12px;color:var(--gris-calido);margin-top:2px;" id="dniDetalles"></div>
        </div>

        <!-- Correo -->
        <div class="input-group">
            <label for="regEmail">Correo electrónico <span class="requerido">*</span></label>
            <input type="email" id="regEmail" placeholder="tu@correo.com" />
        </div>

        <!-- Contraseña -->
        <div class="input-group" style="position:relative;">
            <label for="regPassword">Contraseña <span class="requerido">*</span></label>
            <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" />
            <button class="toggle-password" id="togglePassword" type="button" aria-label="Mostrar contraseña">👁️</button>
        </div>

        <!-- Nivel -->
        <div class="input-group">
            <label for="regNivel">Tipo de perfil</label>
            <select id="regNivel">
                <option value="trabajador">👷 Trabajador</option>
                <option value="empresa" selected>🏢 Empresa</option>
                <option value="especialista">👨‍🔬 Especialista SST</option>
            </select>
        </div>

        <!-- Términos -->
        <div class="terminos">
            <input type="checkbox" id="checkTerminos" />
            <label for="checkTerminos">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
            </label>
        </div>

        <button class="btn-dorado" id="btnRegister" disabled>Verifica tu DNI primero</button>

        <div class="mensaje" id="mensaje"></div>

        <a href="login.html" class="link">¿Ya tienes cuenta? 🔐 Inicia sesión</a>

        <div class="footer">
            ⚡ <strong>LEGADO</strong> · Seguridad Laboral Automática · v1.0
        </div>

    </div>

    <script>
        // ============================================
        //  ELEMENTOS DOM
        // ============================================
        const regDNI = document.getElementById('regDNI');
        const btnVerificar = document.getElementById('btnVerificarDNI');
        const datosDNI = document.getElementById('datosDNI');
        const dniNombre = document.getElementById('dniNombreCompleto');
        const dniDetalles = document.getElementById('dniDetalles');
        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regNivel = document.getElementById('regNivel');
        const checkTerminos = document.getElementById('checkTerminos');
        const btnRegister = document.getElementById('btnRegister');
        const mensaje = document.getElementById('mensaje');

        let dniVerificado = false;
        let datosVerificados = null;

        // ============================================
        //  TOGGLE CONTRASEÑA
        // ============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const type = regPassword.type === 'password' ? 'text' : 'password';
            regPassword.type = type;
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // ============================================
        //  VERIFICAR DNI (DEMO)
        // ============================================
        async function verificarDNI(dni) {
            if (!dni || dni.length !== 8 || !/^\d{8}$/.test(dni)) {
                mensaje.textContent = '✖ Ingresa un DNI válido de 8 dígitos';
                mensaje.className = 'mensaje error';
                return false;
            }

            btnVerificar.textContent = '⏳ Verificando...';
            btnVerificar.disabled = true;
            btnVerificar.className = 'btn-verificar verificando';
            mensaje.textContent = '';

            try {
                await new Promise(resolve => setTimeout(resolve, 800));

                const dnisValidos = [
                    '00000001', '00000002', '00000003', '00000004', '00000005',
                    '12345678', '11111111', '22222222', '33333333', '44444444'
                ];

                if (!dnisValidos.includes(dni)) {
                    throw new Error('DNI no encontrado. Prueba con: 12345678, 00000001, 11111111');
                }

                const seed = parseInt(dni) % 10;
                const nombres = ['JUAN CARLOS', 'MARIA ELENA', 'CARLOS ALBERTO', 'ANA PATRICIA', 'JOSE LUIS',
                    'ROSA MARIA', 'PEDRO ANTONIO', 'LUCIA FERNANDA', 'MIGUEL ANGEL', 'CARMEN ROSA'];
                const apellidos = ['GONZALES', 'PEREZ', 'RODRIGUEZ', 'SANCHEZ', 'FLORES', 'RAMIREZ', 'GARCIA', 'MARTINEZ', 'TORRES', 'CASTRO'];

                const nombreCompleto = `${nombres[seed % nombres.length]} ${apellidos[seed % apellidos.length]} ${apellidos[(seed+3) % apellidos.length]}`;

                datosVerificados = {
                    dni: dni,
                    nombreCompleto: nombreCompleto,
                    fuente: 'DEMO (simulación)'
                };

                datosDNI.classList.add('visible');
                dniNombre.textContent = datosVerificados.nombreCompleto;
                dniDetalles.textContent = `DNI: ${dni} | Fuente: ${datosVerificados.fuente}`;

                btnVerificar.textContent = '✅ Verificado';
                btnVerificar.className = 'btn-verificar valido';
                btnVerificar.disabled = false;

                dniVerificado = true;
                mensaje.textContent = '✓ Identidad verificada correctamente';
                mensaje.className = 'mensaje exito';
                actualizarBotonRegistro();
                return true;

            } catch (error) {
                mensaje.textContent = '✖ ' + error.message;
                mensaje.className = 'mensaje error';
                btnVerificar.textContent = '🔍 Reintentar';
                btnVerificar.className = 'btn-verificar invalido';
                btnVerificar.disabled = false;
                return false;
            }
        }

        // ============================================
        //  ACTUALIZAR BOTÓN REGISTRO
        // ============================================
        function actualizarBotonRegistro() {
            const emailOk = regEmail.value.trim() !== '' && regEmail.value.includes('@');
            const passOk = regPassword.value.length >= 6;
            const terminosOk = checkTerminos.checked;

            if (dniVerificado && emailOk && passOk && terminosOk) {
                btnRegister.disabled = false;
                btnRegister.textContent = '✅ Crear cuenta →';
            } else {
                btnRegister.disabled = true;
                btnRegister.textContent = 'Completa todos los campos';
            }
        }

        // ============================================
        //  EVENTOS
        // ============================================
        btnVerificar.addEventListener('click', function(e) {
            e.preventDefault();
            const dni = regDNI.value.trim();
            verificarDNI(dni);
        });

        regDNI.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') btnVerificar.click();
        });

        regDNI.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 8);
        });

        regEmail.addEventListener('input', actualizarBotonRegistro);
        regPassword.addEventListener('input', actualizarBotonRegistro);
        checkTerminos.addEventListener('change', actualizarBotonRegistro);

        // ============================================
        //  REGISTRO
        // ============================================
        btnRegister.addEventListener('click', function(e) {
            e.preventDefault();

            if (!dniVerificado || !datosVerificados) {
                mensaje.textContent = '✖ Primero verifica tu DNI';
                mensaje.className = 'mensaje error';
                return;
            }

            const email = regEmail.value.trim();
            const password = regPassword.value.trim();
            const nivel = regNivel.value;

            const usuarios = JSON.parse(localStorage.getItem('legado_usuarios') || '[]');

            if (usuarios.find(u => u.email === email)) {
                mensaje.textContent = '✖ Este correo ya está registrado';
                mensaje.className = 'mensaje error';
                return;
            }

            if (usuarios.find(u => u.dni === regDNI.value.trim())) {
                mensaje.textContent = '✖ Este DNI ya está registrado';
                mensaje.className = 'mensaje error';
                return;
            }

            const nuevoUsuario = {
                dni: regDNI.value.trim(),
                nombre: datosVerificados.nombreCompleto,
                email: email,
                password: password,
                nivel: nivel,
                fecha: new Date().toISOString()
            };

            usuarios.push(nuevoUsuario);
            localStorage.setItem('legado_usuarios', JSON.stringify(usuarios));

            localStorage.setItem('legado_sesion', JSON.stringify({
                dni: nuevoUsuario.dni,
                nombre: nuevoUsuario.nombre,
                email: nuevoUsuario.email,
                nivel: nuevoUsuario.nivel
            }));

            mensaje.textContent = '✓ ¡Cuenta creada exitosamente!';
            mensaje.className = 'mensaje exito';
            btnRegister.disabled = true;
            btnRegister.textContent = '✅ Cuenta creada';

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        });

        // ============================================
        //  INICIO
        // ============================================
        console.log('📝 LEGADO - Ventana de Registro');
        console.log('🔑 DNIs demo válidos: 12345678, 00000001, 11111111, 22222222, 33333333');
        actualizarBotonRegistro();
    </script>

</body>
</html>
