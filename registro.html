<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Iniciar sesión</title>
    <style>
        :root {
            --negro-profundo: #0A0A0A;
            --negro-carbono: #1A1A1A;
            --dorado-epico: #C9A84C;
            --dorado-claro: #E0D5A3;
            --blanco-roto: #F5F0E8;
            --gris-calido: #BA7E68;
            --rojo-alerta: #E74C3C;
            --verde-exito: #2ECC71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--negro-profundo);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: var(--negro-carbono);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid var(--dorado-epico);
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(201, 168, 76, 0.15);
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            color: var(--dorado-epico);
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }
        .login-subtitle {
            color: var(--gris-calido);
            text-align: center;
            font-size: 14px;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        /* Selector de idioma */
        .idioma-selector {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .idioma-selector select {
            background: var(--negro-profundo);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--blanco-roto);
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .idioma-selector select:focus {
            border-color: var(--dorado-epico);
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            color: var(--dorado-claro);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--negro-profundo);
            border: 1px solid #333;
            border-radius: 10px;
            color: var(--blanco-roto);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--dorado-epico);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
        }
        .form-group input::placeholder { color: #555; }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 50px; }
        .btn-toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s ease;
            font-family: inherit;
            line-height: 1;
        }
        .btn-toggle-password:hover { color: var(--dorado-epico); }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .form-options label {
            color: var(--gris-calido);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            accent-color: var(--dorado-epico);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .btn-forgot {
            background: none;
            border: none;
            color: var(--dorado-epico);
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s ease;
            font-family: inherit;
        }
        .btn-forgot:hover { color: var(--dorado-claro); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--dorado-epico);
            border: none;
            border-radius: 10px;
            color: var(--negro-profundo);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .btn-login:hover {
            background: var(--dorado-claro);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.3);
        }
        .btn-login:active { transform: scale(0.98); }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--dorado-epico);
            border-radius: 10px;
            color: var(--dorado-epico);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }
        .btn-register:hover {
            background: var(--dorado-epico);
            color: var(--negro-profundo);
            transform: scale(1.02);
        }
        .btn-register:active { transform: scale(0.98); }

        .message-container {
            position: relative;
            margin-bottom: 20px;
        }
        .message {
            padding: 12px 40px 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideDown 0.4s ease;
            display: none;
            position: relative;
        }
        .message.show { display: block; }
        .message.success {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--verde-exito);
            color: var(--verde-exito);
        }
        .message.error {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--rojo-alerta);
            color: var(--rojo-alerta);
        }
        .message.info {
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid var(--dorado-epico);
            color: var(--dorado-claro);
        }
        .btn-close-message {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: inherit;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            padding: 4px 8px;
            font-family: inherit;
            line-height: 1;
        }
        .btn-close-message:hover { opacity: 1; }

        .footer-text {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 25px;
            letter-spacing: 1px;
        }
        .footer-text a {
            color: var(--dorado-epico);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-text a:hover {
            color: var(--dorado-claro);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .login-title { font-size: 26px; }
            .form-options { flex-direction: column; align-items: flex-start; }
            .idioma-selector { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Selector de idioma -->
        <div class="idioma-selector">
            <select id="idiomaSelect">
                <option value="es">🇪🇸 Español</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>

        <h1 class="login-title" id="titulo">LEGADO</h1>
        <p class="login-subtitle" id="subtitulo">SST CORE</p>

        <div class="message-container">
            <div id="message" class="message">
                <span id="messageText"></span>
                <button class="btn-close-message" id="btnCloseMessage" aria-label="Cerrar mensaje">✕</button>
            </div>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email" id="labelEmail">Correo electrónico</label>
                <input type="email" id="email" placeholder="usuario@legado.com" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="password" id="labelPassword">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
                    <button type="button" class="btn-toggle-password" id="btnTogglePassword" aria-label="Mostrar contraseña">👁️</button>
                </div>
            </div>
            <div class="form-options">
                <label id="labelRecordarme"><input type="checkbox" id="remember" /> Recordarme</label>
                <button type="button" class="btn-forgot" id="btnForgot">¿Olvidaste tu contraseña?</button>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
        </form>

        <button class="btn-register" id="btnRegister">Crear cuenta nueva</button>

        <p class="footer-text" id="footerTexto">&copy; 2026 <a href="#">Legado SST</a> — Todos los derechos reservados</p>
    </div>

    <script>
        (function() {
            'use strict';

            // --- ELEMENTOS DOM ---
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberCheck = document.getElementById('remember');
            const messageDiv = document.getElementById('message');
            const messageText = document.getElementById('messageText');

            const btnLogin = document.getElementById('btnLogin');
            const btnRegister = document.getElementById('btnRegister');
            const btnForgot = document.getElementById('btnForgot');
            const btnTogglePassword = document.getElementById('btnTogglePassword');
            const btnCloseMessage = document.getElementById('btnCloseMessage');
            const idiomaSelect = document.getElementById('idiomaSelect');

            // --- TEXTOS POR IDIOMA ---
            const textos = {
                es: {
                    titulo: 'LEGADO',
                    subtitulo: 'SST CORE',
                    email: 'Correo electrónico',
                    password: 'Contraseña',
                    recordarme: 'Recordarme',
                    olvidaste: '¿Olvidaste tu contraseña?',
                    iniciar: 'Iniciar Sesión',
                    crear: 'Crear cuenta nueva',
                    footer: '© 2026 Legado SST — Todos los derechos reservados',
                    placeholderEmail: 'usuario@legado.com',
                    placeholderPass: '••••••••',
                    mensajeExito: '✅ ¡Bienvenido {email}! Inicio de sesión exitoso.',
                    mensajeErrorEmail: 'Por favor, ingresa tu correo electrónico.',
                    mensajeErrorEmailInvalido: 'Ingresa un correo electrónico válido.',
                    mensajeErrorPass: 'Por favor, ingresa tu contraseña.',
                    mensajeErrorPassCorta: 'La contraseña debe tener al menos 6 caracteres.',
                    mensajeRegistro: '📝 Redirigiendo al formulario de registro...',
                    mensajeRecuperar: '📧 Enlace de recuperación enviado a {email}',
                    mensajeRecuperarSinEmail: '📧 Ingresa tu correo para recuperar la contraseña.'
                },
                en: {
                    titulo: 'LEGADO',
                    subtitulo: 'SST CORE',
                    email: 'Email',
                    password: 'Password',
                    recordarme: 'Remember me',
                    olvidaste: 'Forgot your password?',
                    iniciar: 'Sign In',
                    crear: 'Create new account',
                    footer: '© 2026 Legado SST — All rights reserved',
                    placeholderEmail: 'user@legado.com',
                    placeholderPass: '••••••••',
                    mensajeExito: '✅ Welcome {email}! Login successful.',
                    mensajeErrorEmail: 'Please enter your email.',
                    mensajeErrorEmailInvalido: 'Please enter a valid email.',
                    mensajeErrorPass: 'Please enter your password.',
                    mensajeErrorPassCorta: 'Password must be at least 6 characters.',
                    mensajeRegistro: '📝 Redirecting to registration form...',
                    mensajeRecuperar: '📧 Recovery link sent to {email}',
                    mensajeRecuperarSinEmail: '📧 Enter your email to recover your password.'
                }
            };

            function cambiarIdioma(idioma) {
                const t = textos[idioma] || textos.es;
                document.getElementById('titulo').textContent = t.titulo;
                document.getElementById('subtitulo').textContent = t.subtitulo;
                document.getElementById('labelEmail').textContent = t.email;
                document.getElementById('labelPassword').textContent = t.password;
                document.getElementById('labelRecordarme').innerHTML = `<input type="checkbox" id="remember" /> ${t.recordarme}`;
                document.getElementById('btnForgot').textContent = t.olvidaste;
                document.getElementById('btnLogin').textContent = t.iniciar;
                document.getElementById('btnRegister').textContent = t.crear;
                document.getElementById('footerTexto').innerHTML = t.footer;
                emailInput.placeholder = t.placeholderEmail;
                passwordInput.placeholder = t.placeholderPass;
                // Guardar idioma actual para usar en mensajes dinámicos
                window.idiomaActual = idioma;
            }

            idiomaSelect.addEventListener('change', function() {
                cambiarIdioma(this.value);
            });

            // --- FUNCIÓN PARA MOSTRAR MENSAJES CON IDIOMA ---
            function showMessage(textKey, type, params = {}) {
                const idioma = window.idiomaActual || 'es';
                const t = textos[idioma] || textos.es;
                let texto = t[textKey] || textKey;
                // Reemplazar placeholders
                for (const [key, value] of Object.entries(params)) {
                    texto = texto.replace(`{${key}}`, value);
                }
                messageText.textContent = texto;
                messageDiv.className = 'message ' + type + ' show';
                if (type !== 'error') {
                    clearTimeout(window.messageTimeout);
                    window.messageTimeout = setTimeout(() => { hideMessage(); }, 6000);
                }
            }

            function hideMessage() {
                messageDiv.className = 'message';
                messageText.textContent = '';
                clearTimeout(window.messageTimeout);
            }

            btnCloseMessage.addEventListener('click', hideMessage);

            // --- TOGGLE CONTRASEÑA ---
            let passwordVisible = false;
            btnTogglePassword.addEventListener('click', function() {
                passwordVisible = !passwordVisible;
                passwordInput.type = passwordVisible ? 'text' : 'password';
                this.textContent = passwordVisible ? '🙈' : '👁️';
                this.setAttribute('aria-label', passwordVisible ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });

            // --- VALIDACIÓN LOGIN ---
            function handleLogin(event) {
                if (event) event.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (!email) {
                    showMessage('mensajeErrorEmail', 'error');
                    emailInput.focus();
                    return false;
                }
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showMessage('mensajeErrorEmailInvalido', 'error');
                    emailInput.focus();
                    return false;
                }
                if (!password) {
                    showMessage('mensajeErrorPass', 'error');
                    passwordInput.focus();
                    return false;
                }
                if (password.length < 6) {
                    showMessage('mensajeErrorPassCorta', 'error');
                    passwordInput.focus();
                    return false;
                }

                console.log('🔐 Login:', { email, password, remember: rememberCheck.checked });
                showMessage('mensajeExito', 'success', { email });
                setTimeout(() => { alert('🔁 Redirigiendo al panel principal...'); }, 1500);
                return true;
            }

            // --- REGISTRO ---
            function handleRegister() {
                console.log('📝 Registro');
                showMessage('mensajeRegistro', 'info');
                setTimeout(() => { alert('📝 Redirigiendo a registro...'); }, 1000);
            }

            // --- RECUPERAR CONTRASEÑA ---
            function handleForgot() {
                console.log('🔑 Recuperar contraseña');
                const email = emailInput.value.trim();
                if (email && email.includes('@')) {
                    showMessage('mensajeRecuperar', 'info', { email });
                } else {
                    showMessage('mensajeRecuperarSinEmail', 'info');
                    emailInput.focus();
                }
                setTimeout(() => { alert('🔑 Redirigiendo a recuperación...'); }, 1500);
            }

            // --- EVENTOS ---
            form.addEventListener('submit', handleLogin);
            btnLogin.addEventListener('click', function(e) {
                if (!form.checkValidity()) { form.dispatchEvent(new Event('submit')); }
            });
            btnRegister.addEventListener('click', handleRegister);
            btnForgot.addEventListener('click', handleForgot);

            // Validaciones en tiempo real
            emailInput.addEventListener('blur', function() {
                const val = this.value.trim();
                this.style.borderColor = (val && !val.includes('@')) ? 'var(--rojo-alerta)' : '#333';
            });
            passwordInput.addEventListener('blur', function() {
                const val = this.value.trim();
                this.style.borderColor = (val && val.length < 6) ? 'var(--rojo-alerta)' : '#333';
            });
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--dorado-epico)'; });
            });

            // --- INICIALIZAR IDIOMA ---
            cambiarIdioma('es');
            window.idiomaActual = 'es';

            console.log('✅ 5 botones funcionando + selector de idioma:');
            console.log('   🔐 Iniciar Sesión');
            console.log('   👁️ Mostrar/Ocultar contraseña');
            console.log('   ❌ Cerrar mensaje');
            console.log('   📝 Crear cuenta');
            console.log('   🔑 Olvidaste contraseña');
            console.log('   🌐 Cambio de idioma (Español/Inglés)');
        })();
    </script>
</body>
</html>
