<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Dashboard</title>
    <style>
        :root {
            --negro-profundo: #0A0A0A;
            --negro-carbon: #1A1A1A;
            --dorado-epico: #C9A84C;
            --dorado-claro: #E8D5A3;
            --blanco-roto: #F5F0E8;
            --gris-calido: #8A7E6B;
            --rojo-alerta: #E74C3C;
            --verde-exito: #2ECC71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--negro-profundo);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--blanco-roto);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.1);
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .logo {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--dorado-epico);
            letter-spacing: 4px;
        }

        .header .logo span {
            font-size: 12px;
            font-weight: 300;
            color: var(--gris-calido);
            letter-spacing: 1px;
            margin-left: 8px;
        }

        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header .user .nombre {
            color: var(--blanco-roto);
            font-weight: 600;
            font-size: 14px;
        }

        .header .user .badge {
            background: rgba(201, 168, 76, 0.15);
            color: var(--dorado-epico);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: var(--gris-calido);
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .btn-logout:hover {
            border-color: var(--rojo-alerta);
            color: var(--rojo-alerta);
        }

        .page-title {
            margin: 24px 0 8px;
        }

        .page-title h1 {
            font-size: 26px;
            font-weight: 300;
            color: var(--blanco-roto);
        }

        .page-title h1 strong {
            color: var(--dorado-epico);
            font-weight: 700;
        }

        .page-title p {
            color: var(--gris-calido);
            font-size: 14px;
            margin-top: 4px;
        }

        .card {
            background: var(--negro-carbon);
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid rgba(201, 168, 76, 0.06);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--blanco-roto);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-dorado {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--dorado-epico), #B8942E);
            color: var(--negro-profundo);
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.15);
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-dorado:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 168, 76, 0.3);
        }

        .btn-outline {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--dorado-claro);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline:hover {
            border-color: var(--dorado-epico);
            background: rgba(201, 168, 76, 0.04);
        }

        .acciones-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            color: var(--gris-calido);
            font-size: 11px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .footer strong {
            color: var(--dorado-epico);
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .header .user { justify-content: center; }
            .page-title h1 { font-size: 22px; }
            .acciones-grid { grid-template-columns: 1fr; }
            .card { padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="logo">
                LEGADO <span>· Dashboard</span>
            </div>
            <div class="user">
                <span class="nombre" id="userName">👤 Usuario</span>
                <span class="badge" id="userLevel">👷 Trabajador</span>
                <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
            </div>
        </header>

        <!-- ===== TÍTULO ===== -->
        <div class="page-title">
            <h1>Bienvenido, <strong id="welcomeName">Legado</strong></h1>
            <p>Selecciona una opción para comenzar.</p>
        </div>

        <!-- ===== ACCIONES PRINCIPALES ===== -->
        <div class="card">
            <div class="card-title">⚡ Acciones disponibles</div>
            <div class="acciones-grid">
                <a href="trabajador.html" class="btn-dorado">👷 Mi Área de Trabajo</a>
                <button class="btn-dorado" onclick="alert('📝 Formulario de reporte rápido')">📝 Reportar Riesgo</button>
                <button class="btn-outline" onclick="alert('📋 Historial de reportes')">📋 Mis Reportes</button>
                <button class="btn-outline" onclick="alert('👤 Editar perfil')">👤 Mi Perfil</button>
                <button class="btn-outline" onclick="alert('📚 Capacitaciones disponibles')">📚 Capacitaciones</button>
                <button class="btn-outline" onclick="alert('📊 Estadísticas personales')">📊 Mis Estadísticas</button>
            </div>
        </div>

        <!-- ===== INFORMACIÓN DEL TRABAJADOR ===== -->
        <div class="card">
            <div class="card-title">📋 Mi información</div>
            <div id="infoTrabajador">
                <p style="color:var(--gris-calido);font-size:14px;">Carga tus datos desde tu perfil.</p>
            </div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">
            ⚡ <strong>LEGADO</strong> · Seguridad Laboral Automática · v1.0
        </div>

    </div>

    <script>
        // ============================================
        //  CARGAR USUARIO
        // ============================================
        function cargarUsuario() {
            const sesion = JSON.parse(localStorage.getItem('legado_sesion'));
            if (!sesion) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userName').textContent = '👤 ' + sesion.nombre;
            document.getElementById('welcomeName').textContent = sesion.nombre;

            const niveles = {
                'trabajador': '👷 Trabajador',
                'empresa': '🏢 Empresa',
                'especialista': '👨‍🔬 Especialista SST',
                'gubernamental': '🏛️ Gubernamental'
            };
            document.getElementById('userLevel').textContent = niveles[sesion.nivel] || sesion.nivel;

            // Mostrar información adicional
            const info = document.getElementById('infoTrabajador');
            info.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div style="background:var(--negro-profundo);padding:12px;border-radius:10px;">
                        <span style="font-size:11px;color:var(--gris-calido);">📛 Nombre</span>
                        <div style="font-weight:600;color:var(--dorado-epico);">${sesion.nombre}</div>
                    </div>
                    <div style="background:var(--negro-profundo);padding:12px;border-radius:10px;">
                        <span style="font-size:11px;color:var(--gris-calido);">👤 Perfil</span>
                        <div style="font-weight:600;color:var(--dorado-epico);">${niveles[sesion.nivel] || sesion.nivel}</div>
                    </div>
                    <div style="background:var(--negro-profundo);padding:12px;border-radius:10px;">
                        <span style="font-size:11px;color:var(--gris-calido);">📧 Correo</span>
                        <div style="font-weight:600;color:var(--dorado-epico);">${sesion.email || 'No registrado'}</div>
                    </div>
                    <div style="background:var(--negro-profundo);padding:12px;border-radius:10px;">
                        <span style="font-size:11px;color:var(--gris-calido);">📌 Estado</span>
                        <div style="font-weight:600;color:var(--verde-exito);">✅ Activo</div>
                    </div>
                </div>
            `;
        }

        // ============================================
        //  CERRAR SESIÓN
        // ============================================
        function cerrarSesion() {
            localStorage.removeItem('legado_sesion');
            window.location.href = 'index.html';
        }

        cargarUsuario();
        console.log('🏛️ LEGADO - Dashboard del Trabajador');
    </script>

</body>
</html>
