<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Seguridad Laboral Automática</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            max-width: 480px;
            width: 100%;
            border-radius: 2.5rem;
            padding: 2.8rem 2.2rem 2.5rem;
            box-shadow: 0 25px 60px rgba(11, 26, 46, 0.5);
            position: relative;
        }

        .brand {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .brand h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #0b1a2e;
        }

        .brand h1 span {
            color: #c8a84e;
        }

        .brand .subhead {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7a8a9e;
            margin-top: 0.2rem;
            word-spacing: 2px;
        }

        .quote {
            background: #f0f4fa;
            padding: 1.2rem 1.5rem;
            border-radius: 1.8rem;
            margin-bottom: 2rem;
            border-left: 5px solid #c8a84e;
            text-align: center;
        }

        .quote p {
            font-style: italic;
            font-size: 0.95rem;
            color: #2c4057;
            line-height: 1.5;
            font-weight: 500;
        }

        .quote .author {
            display: block;
            margin-top: 0.4rem;
            font-style: normal;
            font-weight: 700;
            font-size: 0.8rem;
            color: #c8a84e;
            letter-spacing: 0.5px;
        }

        .action-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .action-group a {
            flex: 1;
            padding: 0.9rem 0;
            border: none;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .action-group a:first-child {
            background: #0b1a2e;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(11, 26, 46, 0.35);
        }

        .action-group a:first-child:hover {
            background: #1a2f44;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(11, 26, 46, 0.45);
        }

        .action-group a:last-child {
            background: #f0f4fa;
            color: #0b1a2e;
            border: 2px solid #e2e9f2;
        }

        .action-group a:last-child:hover {
            background: #e2e9f2;
            transform: translateY(-2px);
            border-color: #c8a84e;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            color: #2c4057;
        }

        .terms input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            margin-top: 0.1rem;
            accent-color: #c8a84e;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms label {
            cursor: pointer;
            line-height: 1.4;
        }

        .terms label a {
            color: #0b1a2e;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid #c8a84e;
            transition: color 0.2s;
        }

        .terms label a:hover {
            color: #c8a84e;
        }

        .manual-link {
            text-align: center;
            margin-bottom: 2rem;
        }

        .manual-link a {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: #2c4057;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            background: #f0f4fa;
            padding: 0.55rem 1.6rem;
            border-radius: 3rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .manual-link a i {
            color: #c8a84e;
            font-size: 1rem;
        }

        .manual-link a:hover {
            background: #e2e9f2;
            border-color: #c8a84e;
            transform: scale(1.02);
        }

        .footer-info {
            text-align: center;
            border-top: 1px solid #e2e9f2;
            padding-top: 1.5rem;
            margin-top: 0.3rem;
        }

        .footer-info .version {
            font-size: 0.8rem;
            font-weight: 700;
            color: #0b1a2e;
            letter-spacing: 0.5px;
        }

        .footer-info .version i {
            color: #c8a84e;
            margin-right: 0.4rem;
        }

        .footer-info .url {
            display: block;
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: #7a8a9e;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            background: #f5f8fc;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        @media (max-width: 500px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 1.8rem;
            }

            .brand h1 {
                font-size: 2.2rem;
            }

            .action-group {
                flex-direction: column;
                gap: 0.7rem;
            }

            .action-group a {
                padding: 0.8rem 0;
                font-size: 1rem;
            }

            .quote p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <div class="brand">
            <h1>LEGADO <span>+</span></h1>
            <div class="subhead">Conciencia y futuro para la humanidad</div>
        </div>

        <div class="quote">
            <p>
                “La seguridad laboral no debería ser un lujo. Es un derecho. Hazla automática.”
                <span class="author">— LEGADO</span>
            </p>
        </div>

        <div class="action-group">
            <a href="login.html">Ingresar</a>
            <a href="registro.html" id="btnRegistro">Registrarse</a>
        </div>

        <div class="terms">
            <input type="checkbox" id="termsCheck" />
            <label for="termsCheck">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
            </label>
        </div>

        <div class="manual-link">
            <a href="#">
                <i class="fas fa-book-open"></i> Manual de uso y atajos
            </a>
        </div>

        <div class="footer-info">
            <div class="version">
                <i class="fas fa-link"></i> LEGADO · Seguridad Laboral Automática · v1.0
            </div>
            <span class="url">
                https://donjuan2026.github.io/legado-sst-core/
            </span>
        </div>

    </div>

    <script>
        const checkTerms = document.getElementById('termsCheck');
        const btnRegistro = document.getElementById('btnRegistro');

        btnRegistro.style.opacity = '0.5';
        btnRegistro.style.pointerEvents = 'none';

        checkTerms.addEventListener('change', function() {
            if (this.checked) {
                btnRegistro.style.opacity = '1';
                btnRegistro.style.pointerEvents = 'auto';
            } else {
                btnRegistro.style.opacity = '0.5';
                btnRegistro.style.pointerEvents = 'none';
            }
        });

        console.log('🏛️ LEGADO - Página de bienvenida actualizada');
    </script>

</body>
</html>
