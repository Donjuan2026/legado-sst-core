<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Seguridad Laboral Automática</title>
    <style>
        :root {
            --negro-profundo: #0A0A0A;
            --negro-carbon: #1A1A1A;
            --dorado-epico: #C9A84C;
            --dorado-claro: #E8D5A3;
            --blanco-roto: #F5F0E8;
            --gris-calido: #8A7E6B;
            --rojo-alerta: #E74C3C;
            --verde-exito: #2ECC71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--negro-profundo);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--blanco-roto);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: var(--negro-carbon);
            border-radius: 32px;
            padding: 40px 28px 35px;
            border: 1px solid rgba(201, 168, 76, 0.12);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background: radial-gradient(ellipse at 20% 20%, rgba(201, 168, 76, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .logo {
            position: relative;
            z-index: 1;
            margin-bottom: 24px;
        }

        .logo img {
            max-width: 120px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.12));
            transition: transform 0.4s ease;
        }

        .logo img:hover {
            transform: scale(1.02);
        }

        .logo h1 {
            font-family: 'Georgia', serif;
            font-size: 34px;
            font-weight: 700;
            color: var(--dorado-epico);
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(201, 168, 76, 0.1);
            margin-top: -2px;
        }

        .logo .lema {
            font-size: 11px;
            color: var(--dorado-claro);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.5;
        }

        .frase {
            position: relative;
            z-index: 1;
            margin: 24px 0 32px;
            padding: 20px 16px;
            background: var(--negro-profundo);
            border-radius: 16px;
            border-left: 3px solid var(--dorado-epico);
        }

        .frase p {
            font-size: 16px;
            font-weight: 300;
            color: var(--blanco-roto);
            line-height: 1.6;
        }

        .frase .autor {
            font-size: 12px;
            color: var(--gris-calido);
            margin-top: 6px;
            font-style: italic;
        }

        .botones {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-dorado {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--dorado-epico), #B8942E);
            color: var(--negro-profundo);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 25px rgba(201, 168, 76, 0.15);
            text-decoration: none;
            display: block;
        }

        .btn-dorado:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(201, 168, 76, 0.3);
        }

        .btn-outline {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--dorado-claro);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .btn-outline:hover {
            border-color: var(--dorado-epico);
            background: rgba(201, 168, 76, 0.04);
        }

        .terminos {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--gris-calido);
            margin: 8px 0 16px;
            text-align: left;
        }

        .terminos input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--dorado-epico);
            cursor: pointer;
        }

        .terminos a {
            color: var(--dorado-epico);
            text-decoration: none;
        }

        .terminos a:hover {
            text-decoration: underline;
        }

        .manual-link {
            position: relative;
            z-index: 1;
            display: inline-block;
            margin: 8px 0 16px;
            color: var(--gris-calido);
            font-size: 13px;
            text-decoration: none;
            border-bottom: 1px dashed var(--gris-calido);
            transition: 0.3s;
        }

        .manual-link:hover {
            color: var(--dorado-claro);
            border-bottom-color: var(--dorado-claro);
        }

        .footer {
            position: relative;
            z-index: 1;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(201, 168, 76, 0.05);
            font-size: 11px;
            color: var(--gris-calido);
        }

        .footer strong {
            color: var(--dorado-epico);
        }

        @media (max-width: 420px) {
            .container {
                padding: 28px 16px 24px;
                border-radius: 24px;
            }
            .logo h1 {
                font-size: 28px;
                letter-spacing: 6px;
            }
            .logo img {
                max-width: 100px;
            }
            .frase p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">
            <img src="logo.jpg" alt="LEGADO" id="logoImg" onerror="this.style.display='none'" />
            <h1>LEGADO</h1>
            <div class="lema">✦ Conciencia y Futuro para la Humanidad ✦</div>
        </div>

        <div class="frase">
            <p>"La seguridad laboral no debería ser un lujo. Es un derecho. Hazla automática."</p>
            <div class="autor">— LEGADO</div>
        </div>

        <div class="botones">
            <a href="login.html" class="btn-dorado">🔐 Ingresar</a>
            <a href="registro.html" class="btn-outline" id="btnRegistro">📝 Registrarse</a>
        </div>

        <div class="terminos">
            <input type="checkbox" id="checkTerminos" />
            <label for="checkTerminos">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
            </label>
        </div>

        <a href="MANUAL.md" class="manual-link">📖 Manual de uso y atajos</a>

        <div class="footer">
            ⚡ <strong>LEGADO</strong> · Seguridad Laboral Automática · v1.0
        </div>

    </div>

    <script>
        const checkTerminos = document.getElementById('checkTerminos');
        const btnRegistro = document.getElementById('btnRegistro');

        btnRegistro.style.opacity = '0.5';
        btnRegistro.style.pointerEvents = 'none';

        checkTerminos.addEventListener('change', function() {
            if (this.checked) {
                btnRegistro.style.opacity = '1';
                btnRegistro.style.pointerEvents = 'auto';
            } else {
                btnRegistro.style.opacity = '0.5';
                btnRegistro.style.pointerEvents = 'none';
            }
        });

        const logoImg = document.getElementById('logoImg');
        logoImg.addEventListener('error', function() {
            this.style.display = 'none';
        });

        console.log('🏛️ LEGADO - Ventana de Bienvenida');
    </script>

</body>
</html>
