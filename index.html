<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Seguridad Laboral Automática</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            max-width: 420px;
            width: 100%;
            border-radius: 2.5rem;
            padding: 2.8rem 2.2rem 2.5rem;
            box-shadow: 0 25px 60px rgba(11, 26, 46, 0.5);
            text-align: center;
        }

        .brand h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #0b1a2e;
        }

        .brand h1 span {
            color: #c8a84e;
        }

        .brand .subhead {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #7a8a9e;
            margin-top: -0.2rem;
        }

        .quote {
            margin: 1.8rem 0;
            font-style: italic;
            font-size: 0.95rem;
            color: #2c4057;
            line-height: 1.5;
        }

        .quote .author {
            display: block;
            margin-top: 0.3rem;
            font-style: normal;
            font-weight: 700;
            font-size: 0.8rem;
            color: #c8a84e;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.9rem 0;
            border: none;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            text-align: center;
            margin-bottom: 0.8rem;
        }

        .btn-primary {
            background: #0b1a2e;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(11, 26, 46, 0.35);
        }

        .btn-primary:hover {
            background: #1a2f44;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(11, 26, 46, 0.45);
        }

        .btn-secondary {
            background: #f0f4fa;
            color: #0b1a2e;
            border: 2px solid #e2e9f2;
        }

        .btn-secondary:hover {
            background: #e2e9f2;
            transform: translateY(-2px);
            border-color: #c8a84e;
        }

        .btn-secondary.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            margin: 1.5rem 0 1.2rem;
            font-size: 0.85rem;
            color: #2c4057;
            text-align: left;
        }

        .terms input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            margin-top: 0.1rem;
            accent-color: #c8a84e;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms label {
            cursor: pointer;
            line-height: 1.4;
        }

        .terms label a {
            color: #0b1a2e;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid #c8a84e;
        }

        .terms label a:hover {
            color: #c8a84e;
        }

        .manual-link {
            margin: 1.2rem 0 1.8rem;
        }

        .manual-link a {
            color: #2c4057;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            background: #f0f4fa;
            padding: 0.5rem 1.8rem;
            border-radius: 3rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: inline-block;
        }

        .manual-link a i {
            color: #c8a84e;
            margin-right: 0.5rem;
        }

        .manual-link a:hover {
            background: #e2e9f2;
            border-color: #c8a84e;
        }

        .footer-info {
            border-top: 1px solid #e2e9f2;
            padding-top: 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0b1a2e;
            letter-spacing: 0.5px;
        }

        .footer-info i {
            color: #c8a84e;
            margin-right: 0.4rem;
        }

        @media (max-width: 500px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 1.8rem;
            }

            .brand h1 {
                font-size: 2.2rem;
            }

            .btn {
                font-size: 1rem;
                padding: 0.8rem 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <div class="brand">
            <h1>LEGADO <span>+</span></h1>
            <div class="subhead">CONCIENCIA Y FUTURO PARA LA HUMANIDAD</div>
        </div>

        <div class="quote">
            "La seguridad laboral no debería ser un lujo. Es un derecho. Hazla automática."
            <span class="author">— LEGADO</span>
        </div>

        <a href="login.html" class="btn btn-primary">Ingresar</a>
        <a href="registro.html" class="btn btn-secondary" id="btnRegistro">Registrarse</a>

        <div class="terms">
            <input type="checkbox" id="termsCheck" />
            <label for="termsCheck">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
            </label>
        </div>

        <div class="manual-link">
            <a href="#">
                <i class="fas fa-book-open"></i> Manual de uso y atajos
            </a>
        </div>

        <div class="footer-info">
            <i class="fas fa-link"></i> LEGADO Seguridad Laboral Automática - v1.0
        </div>

    </div>

    <script>
        const checkTerms = document.getElementById('termsCheck');
        const btnRegistro = document.getElementById('btnRegistro');

        btnRegistro.classList.add('disabled');

        checkTerms.addEventListener('change', function() {
            if (this.checked) {
                btnRegistro.classList.remove('disabled');
            } else {
                btnRegistro.classList.add('disabled');
            }
        });

        console.log('🏛️ LEGADO - Página de bienvenida actualizada');
    </script>

</body>
</html>
