<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGADO · Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f2ede4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background: #ffffff;
            border-radius: 32px;
            padding: 2.8rem 3rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(31, 42, 54, 0.12);
            border: 1px solid rgba(180, 139, 90, 0.15);
        }

        /* Logo */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            background: #b48b5a;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.6rem;
            color: #1f2a36;
            box-shadow: 0 4px 12px rgba(180, 139, 90, 0.3);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: #1f2a36;
            letter-spacing: -0.02em;
        }

        .logo-text span {
            color: #b48b5a;
        }

        /* Título */
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2a36;
            margin-bottom: 0.3rem;
        }

        .login-sub {
            color: #7a6e5e;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Campos */
        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f2a36;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e8dfd2;
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: #fcf9f4;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
            color: #1f2a36;
        }

        .form-group input:focus {
            border-color: #b48b5a;
            box-shadow: 0 0 0 4px rgba(180, 139, 90, 0.12);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #cfc1aa;
        }

        /* Opciones */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.2rem 0 1.8rem 0;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4f4539;
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #b48b5a;
            cursor: pointer;
        }

        .forgot-link {
            color: #b48b5a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #1f2a36;
        }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #1f2a36;
            color: #f5efe6;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
            letter-spacing: 0.01em;
        }

        .btn-login:hover {
            background: #b48b5a;
            color: #1f2a36;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Registro */
        .register-row {
            text-align: center;
            margin-top: 1.8rem;
            color: #7a6e5e;
            font-size: 0.95rem;
        }

        .register-row a {
            color: #b48b5a;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .register-row a:hover {
            color: #1f2a36;
        }

        /* Paleta de colores (mini muestra) */
        .color-strip {
            display: flex;
            gap: 6px;
            margin-top: 2rem;
            justify-content: center;
        }

        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            .logo-text {
                font-size: 1.6rem;
            }
            .login-title {
                font-size: 1.3rem;
            }
            .options-row {
                flex-wrap: wrap;
                gap: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-icon">L</div>
            <div class="logo-text">LEGADO<span>.</span></div>
        </div>

        <!-- Título -->
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-sub">Inicia sesión para continuar</p>

        <!-- Formulario -->
        <form>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="options-row">
                <label class="remember">
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <div class="register-row">
            ¿No tienes cuenta? <a href="#">Regístrate</a>
        </div>

        <!-- Mini muestra de la paleta LEGADO -->
        <div class="color-strip">
            <span class="color-dot" style="background: #1f2a36;" title="#1F2A36"></span>
            <span class="color-dot" style="background: #b48b5a;" title="#B48B5A"></span>
            <span class="color-dot" style="background: #f5efe6; border-color: #cfc1aa;" title="#F5EFE6"></span>
            <span class="color-dot" style="background: #cfc1aa;" title="#CFC1AA"></span>
            <span class="color-dot" style="background: #f2ede4; border-color: #cfc1aa;" title="#F2EDE4"></span>
        </div>
    </div>

</body>
</html>
