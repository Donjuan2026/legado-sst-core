<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGADO - Área de Trabajo</title>
    <style>
        :root {
            --negro-profundo: #0A0A0A;
            --negro-carbon: #1A1A1A;
            --dorado-epico: #C9A84C;
            --dorado-claro: #E8D5A3;
            --blanco-roto: #F5F0E8;
            --gris-calido: #8A7E6B;
            --rojo-alerta: #E74C3C;
            --verde-exito: #2ECC71;
            --naranja: #E67E22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--negro-profundo);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--blanco-roto);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.1);
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .logo {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--dorado-epico);
            letter-spacing: 4px;
        }

        .header .logo span {
            font-size: 12px;
            font-weight: 300;
            color: var(--gris-calido);
            letter-spacing: 1px;
            margin-left: 8px;
        }

        .header .user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .user .nombre {
            color: var(--blanco-roto);
            font-weight: 600;
            font-size: 14px;
        }

        .header .user .badge {
            background: rgba(201, 168, 76, 0.15);
            color: var(--dorado-epico);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: var(--gris-calido);
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .btn-logout:hover {
            border-color: var(--rojo-alerta);
            color: var(--rojo-alerta);
        }

        .page-title {
            margin: 24px 0 8px;
        }

        .page-title h1 {
            font-size: 26px;
            font-weight: 300;
            color: var(--blanco-roto);
        }
